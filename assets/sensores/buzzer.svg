<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2540"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="45%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="50%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </radialGradient>
    <radialGradient id="topGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#5a5a5a"/>
      <stop offset="100%" style="stop-color:#2a2a2a"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowOrange"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a3a60"/>
      <stop offset="100%" style="stop-color:#1a2540"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d0d0d0"/>
      <stop offset="100%" style="stop-color:#888"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="300" height="300" fill="url(#bgGrad)" rx="18"/>

  <!-- Partículas decorativas -->
  <circle cx="30" cy="40" r="1.5" fill="#f7b731" opacity="0.4"/>
  <circle cx="268" cy="55" r="1.5" fill="#e056da" opacity="0.3"/>
  <circle cx="270" cy="260" r="2" fill="#4ecdc4" opacity="0.2"/>

  <!-- Ondas sonoras (decoración) -->
  <g opacity="0.2" stroke="#ffa500" stroke-width="1.5" fill="none">
    <path d="M 210 100 Q 235 132 210 165"/>
    <path d="M 220 90 Q 252 132 220 175"/>
    <path d="M 230 80 Q 268 132 230 185"/>
  </g>

  <!-- Cuerpo cilíndrico del buzzer - vista de frente/top -->
  <!-- Sombra -->
  <ellipse cx="153" cy="172" rx="60" ry="18" fill="#000" opacity="0.4"/>

  <!-- Cuerpo principal negro -->
  <ellipse cx="150" cy="148" rx="65" ry="22" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <rect x="85" y="100" width="130" height="48" rx="4" fill="url(#bodyGrad)" stroke="#111" stroke-width="2" filter="url(#glow)"/>
  <rect x="85" y="148" width="130" height="2" fill="#0a0a0a"/>

  <!-- Cara superior del buzzer (círculo con agujero) -->
  <ellipse cx="150" cy="100" rx="65" ry="22" fill="url(#topGrad)" stroke="#3a3a3a" stroke-width="2"/>

  <!-- Agujero central del buzzer (donde sale el sonido) -->
  <circle cx="150" cy="100" r="28" fill="#111" stroke="#222" stroke-width="1.5"/>
  <circle cx="150" cy="100" r="18" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="150" cy="100" r="10" fill="#050505"/>

  <!-- Ranuras circulares de ventilación / membrana -->
  <circle cx="150" cy="100" r="35" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="3 4"/>
  <circle cx="150" cy="100" r="48" fill="none" stroke="#333" stroke-width="0.8" stroke-dasharray="2 5"/>

  <!-- Cruz de la membrana -->
  <line x1="122" y1="100" x2="178" y2="100" stroke="#333" stroke-width="1" opacity="0.6"/>
  <line x1="150" y1="72" x2="150" y2="128" stroke="#333" stroke-width="1" opacity="0.6"/>

  <!-- Label en el cuerpo -->
  <text x="150" y="140" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#888" opacity="0.8">+ 5V  GND -</text>

  <!-- Shine en la cara superior -->
  <ellipse cx="128" cy="90" rx="16" ry="7" fill="#fff" opacity="0.07"/>

  <!-- Pins de conexión (positivo y negativo) -->
  <rect x="118" y="170" width="10" height="35" rx="2" fill="url(#pinGrad)"/>
  <rect x="172" y="170" width="10" height="35" rx="2" fill="url(#pinGrad)"/>

  <!-- Indicador + y - -->
  <text x="123" y="215" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ff4444">+</text>
  <text x="177" y="215" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#90caf9">−</text>

  <!-- Nota musical decorativa -->
  <text x="82" y="90" font-size="18" fill="#ffa500" opacity="0.5" filter="url(#glowOrange)">♪</text>
  <text x="206" y="90" font-size="14" fill="#ffa500" opacity="0.4">♫</text>

  <!-- Etiqueta inferior -->
  <rect x="55" y="228" width="190" height="52" rx="8" fill="url(#labelGrad)" stroke="#2a3a60" stroke-width="1"/>
  <text x="150" y="246" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffa500">Buzzer Piezoeléctrico</text>
  <text x="150" y="262" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#a0b4d0">Activo/Pasivo · 3.3–5V · ~30mA</text>
  <text x="150" y="275" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#607090">Transductor Electroacústico</text>
</svg>
