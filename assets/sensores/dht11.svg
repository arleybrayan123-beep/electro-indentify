<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2540"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a7bd5"/>
      <stop offset="100%" style="stop-color:#1a4a9a"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf0"/>
      <stop offset="100%" style="stop-color:#b0b8c8"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a3a60"/>
      <stop offset="100%" style="stop-color:#1a2540"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d0d0d0"/>
      <stop offset="100%" style="stop-color:#888"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="300" height="300" fill="url(#bgGrad)" rx="18"/>

  <!-- Partículas decorativas -->
  <circle cx="28" cy="42" r="1.5" fill="#4ecdc4" opacity="0.4"/>
  <circle cx="272" cy="258" r="1.5" fill="#ffd700" opacity="0.3"/>
  <circle cx="270" cy="48" r="2" fill="#e056da" opacity="0.2"/>

  <!-- Cuerpo rectangular del DHT11 (azul característico) -->
  <rect x="88" y="75" width="124" height="120" rx="10" fill="url(#bodyGrad)" stroke="#1a3a80" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Cara frontal con rejilla (malla blanca del sensor) -->
  <rect x="95" y="82" width="110" height="106" rx="6" fill="url(#topGrad)" stroke="#a0a8b8" stroke-width="1.5"/>

  <!-- Patrón de rejilla del DHT11 -->
  <g stroke="#8090a8" stroke-width="0.8" opacity="0.7">
    <!-- Horizontal -->
    <line x1="97" y1="96" x2="203" y2="96"/>
    <line x1="97" y1="108" x2="203" y2="108"/>
    <line x1="97" y1="120" x2="203" y2="120"/>
    <line x1="97" y1="132" x2="203" y2="132"/>
    <line x1="97" y1="144" x2="203" y2="144"/>
    <line x1="97" y1="156" x2="203" y2="156"/>
    <line x1="97" y1="168" x2="203" y2="168"/>
    <!-- Vertical -->
    <line x1="111" y1="84" x2="111" y2="186"/>
    <line x1="125" y1="84" x2="125" y2="186"/>
    <line x1="139" y1="84" x2="139" y2="186"/>
    <line x1="153" y1="84" x2="153" y2="186"/>
    <line x1="167" y1="84" x2="167" y2="186"/>
    <line x1="181" y1="84" x2="181" y2="186"/>
    <line x1="195" y1="84" x2="195" y2="186"/>
  </g>

  <!-- Texto en la rejilla -->
  <text x="150" y="128" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#2060b0" opacity="0.7">DHT11</text>

  <!-- Chip interno (interior del sensor) -->
  <rect x="130" y="140" width="40" height="22" rx="3" fill="#2a3a60" opacity="0.6"/>
  <text x="150" y="155" text-anchor="middle" font-family="monospace" font-size="7" fill="#90caf9">IC</text>

  <!-- Shine en la cara -->
  <rect x="97" y="84" width="45" height="20" rx="4" fill="#fff" opacity="0.08"/>

  <!-- Pines de conexión -->
  <rect x="98" y="195" width="10" height="30" rx="2" fill="url(#pinGrad)"/>
  <rect x="116" y="195" width="10" height="30" rx="2" fill="url(#pinGrad)"/>
  <rect x="134" y="195" width="10" height="30" rx="2" fill="url(#pinGrad)"/>
  <rect x="152" y="195" width="10" height="30" rx="2" fill="url(#pinGrad)"/>

  <!-- Labels pines -->
  <text x="103" y="232" text-anchor="middle" font-family="monospace" font-size="7" fill="#90caf9">VCC</text>
  <text x="121" y="232" text-anchor="middle" font-family="monospace" font-size="7" fill="#90caf9">DAT</text>
  <text x="139" y="232" text-anchor="middle" font-family="monospace" font-size="7" fill="#90caf9">NC</text>
  <text x="157" y="232" text-anchor="middle" font-family="monospace" font-size="7" fill="#90caf9">GND</text>

  <!-- Iconos de temperatura y humedad -->
  <text x="120" y="72" text-anchor="middle" font-size="13" fill="#ffd700" opacity="0.8">🌡</text>
  <text x="182" y="72" text-anchor="middle" font-size="13" fill="#4ecdc4" opacity="0.8">💧</text>

  <!-- Etiqueta inferior -->
  <rect x="55" y="240" width="190" height="45" rx="8" fill="url(#labelGrad)" stroke="#2a3a60" stroke-width="1"/>
  <text x="150" y="257" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#45aaf2">Sensor DHT11</text>
  <text x="150" y="272" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="#a0b4d0">0–50°C · 20–90% HR · 3.3–5V</text>
  <text x="150" y="282" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#607090">Temperatura y Humedad Digital</text>
</svg>
