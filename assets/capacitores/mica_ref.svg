<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="100%" height="100%" fill="#0d0f17" rx="15" ry="15"/>
  <rect x="2" y="2" width="396" height="246" fill="none" stroke="#00f2ff" stroke-width="2" rx="15" ry="15" opacity="0.3"/>
  <text x="50%" y="40" fill="#00f2ff" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Datos: Capacitor de Mica</text>
  <line x1="50" y1="55" x2="350" y2="55" stroke="#00f2ff" stroke-width="1" opacity="0.5"/>
  <text x="50%" y="80" fill="#00f2ff" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Características Principales</text>
  <text x="50%" y="110" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="normal" text-anchor="middle">Dieléctrico: Mica natural (mineral)</text>
  <text x="50%" y="140" fill="#00ffaa" font-family="sans-serif" font-size="16" font-weight="normal" text-anchor="middle">Alta Precisión: Tolerancias de ±1% a ±5%</text>
  <text x="50%" y="170" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="normal" text-anchor="middle">Uso: Osciladores y Radiofrecuencia (RF)</text>
  <text x="50%" y="200" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="normal" text-anchor="middle">Código: Impreso en pF o puntos de color</text>
  <text x="50%" y="230" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="normal" text-anchor="middle">No polarizado - Soporta altos voltajes</text>
</svg>