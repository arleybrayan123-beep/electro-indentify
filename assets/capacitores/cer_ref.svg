<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="100%" height="100%" fill="#0d0f17" rx="15" ry="15"/>
  <rect x="2" y="2" width="396" height="246" fill="none" stroke="#00f2ff" stroke-width="2" rx="15" ry="15" opacity="0.3"/>
  <text x="50%" y="40" fill="#00f2ff" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Lectura Capacitor Cerámico</text>
  <line x1="50" y1="55" x2="350" y2="55" stroke="#00f2ff" stroke-width="1" opacity="0.5"/>
  <text x="50%" y="80" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Ejemplo de Código: 104</text>
  <text x="50%" y="110" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="normal" text-anchor="middle">1º Dígito: 1</text>
  <text x="50%" y="140" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="normal" text-anchor="middle">2º Dígito: 0</text>
  <text x="50%" y="170" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="normal" text-anchor="middle">3º Dígito (Multiplicador): 0000</text>
  <text x="50%" y="200" fill="#00ffaa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Resultado: 100,000 pF</text>
  <text x="50%" y="230" fill="#00ffaa" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Equivalencia: 100 nF = 0.1 µF</text>
</svg>