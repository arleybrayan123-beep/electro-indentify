<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <linearGradient id="cyberBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0a0b10"/>
            <stop offset="100%" stop-color="#161821"/>
        </linearGradient>
        <filter id="neonOrange" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <rect width="400" height="300" fill="url(#cyberBg)" rx="15"/>
    <path d="M0,50 L400,50 M0,100 L400,100 M0,150 L400,150 M0,200 L400,200 M0,250 L400,250" stroke="#ff9d00" stroke-width="0.5" stroke-opacity="0.1"/>
    
    <!-- Coils -->
    <path d="M50,150 C50,50 150,50 150,150 C150,250 250,250 250,150 C250,50 350,50 350,150" fill="none" stroke="#ff9d00" stroke-width="12" stroke-linecap="round" filter="url(#neonOrange)"/>
    
    <!-- Labels -->
    <text x="200" y="270" fill="#ff9d00" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle" filter="url(#neonOrange)">IND-AIR</text>
</svg>
