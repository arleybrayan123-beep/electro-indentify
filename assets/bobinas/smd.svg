<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <linearGradient id="cyberBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0a0b10"/>
            <stop offset="100%" stop-color="#161821"/>
        </linearGradient>
        <filter id="neonGreen" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="smdBody" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#222"/>
            <stop offset="100%" stop-color="#111"/>
        </linearGradient>
    </defs>
    <rect width="400" height="300" fill="url(#cyberBg)" rx="15"/>
    
    <!-- SMD Pads -->
    <rect x="110" y="70" width="180" height="40" fill="#silver" filter="url(#neonGreen)"/>
    <rect x="110" y="170" width="180" height="40" fill="#silver" filter="url(#neonGreen)"/>
    
    <!-- SMD Body -->
    <rect x="120" y="80" width="160" height="120" rx="10" fill="url(#smdBody)" stroke="#00ff66" stroke-width="2" filter="url(#neonGreen)"/>
    
    <!-- Top Text SMD code -->
    <text x="200" y="150" fill="#00ff66" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle" filter="url(#neonGreen)">IND-SMD-4U7</text>
    
    <text x="200" y="270" fill="#00ff66" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle" filter="url(#neonGreen)">4.7µH REF: IND-SMD-4U7</text>
</svg>
