<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <linearGradient id="cyberBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0a0b10"/>
            <stop offset="100%" stop-color="#161821"/>
        </linearGradient>
        <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="bodyGlow" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#333"/>
            <stop offset="50%" stop-color="#111"/>
            <stop offset="100%" stop-color="#222"/>
        </linearGradient>
    </defs>
    <rect width="400" height="300" fill="url(#cyberBg)" rx="15"/>
    
    <!-- Grid -->
    <path d="M0,50 L400,50 M0,100 L400,100 M0,150 L400,150 M0,200 L400,200 M0,250 L400,250" stroke="#00f2ff" stroke-width="0.5" stroke-opacity="0.1"/>
    <path d="M50,0 L50,300 M100,0 L100,300 M150,0 L150,300 M200,0 L200,300 M250,0 L250,300 M300,0 L300,300 M350,0 L350,300" stroke="#00f2ff" stroke-width="0.5" stroke-opacity="0.1"/>

    <!-- Left lead -->
    <rect x="50" y="145" width="80" height="10" fill="#a0a0a0" filter="url(#neonGlow)"/>
    <!-- Right lead -->
    <rect x="270" y="145" width="80" height="10" fill="#a0a0a0" filter="url(#neonGlow)"/>

    <!-- Diode Body -->
    <rect x="130" y="120" width="140" height="60" rx="6" fill="url(#bodyGlow)" stroke="#00f2ff" stroke-width="2" filter="url(#neonGlow)"/>
    
    <!-- Cathode Band -->
    <rect x="230" y="120" width="15" height="60" fill="#a0a0a0" filter="url(#neonGlow)"/>
    
    <!-- Text Label -->
    <text x="175" y="155" fill="#00f2ff" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle" filter="url(#neonGlow)">1N5819</text>
    <text x="175" y="170" fill="#a0a0a0" font-family="monospace" font-size="10" text-anchor="middle">SCHOTTKY</text>
</svg>
