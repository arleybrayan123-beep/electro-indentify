<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <linearGradient id="cyberBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0a0b10"/>
            <stop offset="100%" stop-color="#161821"/>
        </linearGradient>
        <filter id="neonPurple" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="bodyRect" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2a2a35"/>
            <stop offset="100%" stop-color="#12121a"/>
        </linearGradient>
    </defs>
    <rect width="400" height="300" fill="url(#cyberBg)" rx="15"/>
    
    <!-- Grid -->
    <path d="M0,50 L400,50 M0,100 L400,100 M0,150 L400,150 M0,200 L400,200 M0,250 L400,250" stroke="#b026ff" stroke-width="0.5" stroke-opacity="0.1"/>
    <path d="M50,0 L50,300 M100,0 L100,300 M150,0 L150,300 M200,0 L200,300 M250,0 L250,300 M300,0 L300,300 M350,0 L350,300" stroke="#b026ff" stroke-width="0.5" stroke-opacity="0.1"/>

    <!-- 4 Pins -->
    <rect x="135" y="180" width="10" height="70" fill="#a0a0a0" filter="url(#neonPurple)"/>
    <rect x="175" y="180" width="10" height="70" fill="#a0a0a0" filter="url(#neonPurple)"/>
    <rect x="215" y="180" width="10" height="70" fill="#a0a0a0" filter="url(#neonPurple)"/>
    <rect x="255" y="180" width="10" height="70" fill="#a0a0a0" filter="url(#neonPurple)"/>

    <!-- Main Block -->
    <rect x="110" y="80" width="180" height="105" rx="8" fill="url(#bodyRect)" stroke="#b026ff" stroke-width="2" filter="url(#neonPurple)"/>
    
    <!-- Pin Labels -->
    <text x="140" y="175" fill="#b026ff" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">+</text>
    <text x="180" y="175" fill="#b026ff" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">~</text>
    <text x="220" y="175" fill="#b026ff" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">~</text>
    <text x="260" y="170" fill="#b026ff" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">-</text>

    <!-- Text -->
    <text x="200" y="130" fill="#b026ff" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle" filter="url(#neonPurple)">KBL410</text>
</svg>
